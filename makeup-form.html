<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Make-up Leave Form | IBSH</title>
  <link rel="icon" href="data:,">
  <script src="https://www.gstatic.com/firebasejs/12.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.7.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/12.7.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js?v=20260706-notify3"></script>
  <script src="shared-db.js?v=20260717-makeup1"></script>
  <script src="makeup-service.js?v=20260717-1"></script>
  <script src="leave-form-renderer.js?v=20260717-makeup1"></script>
  <style>
    :root {
      --bg: #e9eeeb;
      --surface: #ffffff;
      --ink: #142019;
      --muted: #637168;
      --line: #d9e2dc;
      --green: #2f7657;
      --green-dark: #245d45;
      --green-soft: #e3f1e9;
      --amber: #a96919;
      --amber-soft: #fff3df;
      --red: #a23b35;
      --red-soft: #fce9e6;
      --shadow: 0 16px 42px rgba(20, 32, 25, 0.14);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    button, a { font: inherit; -webkit-tap-highlight-color: transparent; }
    [hidden] { display: none !important; }
    .mf-topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      min-height: 66px;
      padding: 10px max(18px, calc((100vw - 1080px) / 2));
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.95);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }
    .mf-brand { display: flex; align-items: center; gap: 10px; color: var(--ink); text-decoration: none; font-weight: 900; }
    .mf-brand span { width: 38px; height: 38px; display: grid; place-items: center; border-radius: 7px; background: #18251e; color: #ffffff; font-size: 11px; }
    .mf-actions { display: flex; align-items: center; gap: 8px; }
    .mf-button {
      min-height: 40px;
      padding: 0 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #ffffff;
      color: #23344a;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 900;
    }
    .mf-button.primary { border-color: var(--green); background: var(--green); color: #ffffff; }
    .mf-button.primary:hover { background: var(--green-dark); }
    .mf-layout { width: min(1080px, calc(100% - 32px)); margin: 0 auto; padding: 24px 0 48px; }
    .mf-status {
      margin-bottom: 18px;
      padding: 15px 18px;
      border: 1px solid #bad9c7;
      border-radius: 7px;
      background: var(--green-soft);
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .mf-status-icon { width: 26px; height: 26px; flex: 0 0 26px; display: grid; place-items: center; border-radius: 50%; background: var(--green); color: #ffffff; font-weight: 900; }
    .mf-status strong, .mf-status span { display: block; }
    .mf-status strong { font-size: 14px; }
    .mf-status span { margin-top: 3px; color: #466052; font-size: 13px; line-height: 1.45; }
    .mf-status.paper { border-color: #edcf9f; background: var(--amber-soft); }
    .mf-status.paper .mf-status-icon { background: var(--amber); }
    .mf-status.paper span { color: #755022; }
    .mf-status.error { border-color: #edc8c4; background: var(--red-soft); }
    .mf-status.error .mf-status-icon { background: var(--red); }
    .mf-status.error span { color: #77312d; }
    .leave-sheet-stack { display: grid; gap: 18px; }
    .leave-sheet {
      position: relative;
      width: min(210mm, 100%);
      aspect-ratio: 595.32 / 841.92;
      margin: 0 auto;
      background: #ffffff;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .leave-sheet-bg, .leave-sheet-svg { position: absolute; inset: 0; width: 100%; height: 100%; }
    .leave-sheet-bg { object-fit: cover; user-select: none; -webkit-user-drag: none; }
    .leave-overlay-text, .leave-overlay-note { fill: #111827; font-family: "Times New Roman", serif; }
    .leave-empty {
      min-height: 420px;
      padding: 48px 24px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      display: grid;
      place-items: center;
      text-align: center;
    }
    .leave-empty h2 { margin: 0 0 8px; }
    .leave-empty p { max-width: 480px; margin: 0; color: var(--muted); line-height: 1.6; }
    .leave-empty-link { margin-top: 18px !important; }
    .leave-empty a { color: var(--green); font-weight: 800; text-decoration: none; }
    .mf-loading { min-height: 60vh; display: grid; place-items: center; color: var(--muted); font-weight: 800; }
    @page { size: A4; margin: 0; }
    @media print {
      body { background: #ffffff; }
      .mf-topbar, .mf-status, .mf-loading { display: none !important; }
      .mf-layout { width: auto; margin: 0; padding: 0; }
      .leave-sheet-stack { gap: 0; }
      .leave-sheet { width: 210mm; margin: 0; box-shadow: none; break-after: page; }
      .leave-sheet:last-child { break-after: auto; }
    }
    @media (max-width: 620px) {
      .mf-topbar { min-height: 60px; padding: 9px 12px; }
      .mf-brand { font-size: 13px; }
      .mf-brand span { width: 34px; height: 34px; font-size: 10px; }
      .mf-button { width: 40px; min-width: 40px; padding: 0; font-size: 0; }
      .mf-button::before { font-size: 19px; }
      .mf-button.back::before { content: '\2190'; }
      .mf-button.primary::before { content: '\2399'; }
      .mf-layout { width: calc(100% - 20px); padding-top: 12px; }
      .mf-status { padding: 12px; margin-bottom: 12px; }
    }
  </style>
</head>
<body>
  <header class="mf-topbar">
    <a class="mf-brand" href="makeup.html"><span>IBSH</span>Make-up Leave Form</a>
    <div class="mf-actions">
      <a class="mf-button back" id="backButton" href="makeup.html">← Back to cases</a>
      <button type="button" class="mf-button primary" onclick="window.print()">⎙ Print / Save PDF</button>
    </div>
  </header>
  <main class="mf-layout">
    <div class="mf-loading" id="loadingState">Loading signed form...</div>
    <section class="mf-status" id="formStatus" hidden>
      <span class="mf-status-icon" id="formStatusIcon">✓</span>
      <div><strong id="formStatusTitle">Parent signature recorded</strong><span id="formStatusText">The signed make-up form is ready to print.</span></div>
    </section>
    <div id="formContent"></div>
  </main>

  <script>
    const DB = window.AppDB;
    const Makeup = window.MakeupService;
    const Renderer = window.LeaveFormRenderer;
    function clean(value) { return String(value == null ? '' : value).trim(); }
    function initFirebase() {
      if (typeof firebase === 'undefined' || !window.__FIREBASE_CONFIG__) throw new Error('Firebase is unavailable.');
      if (!firebase.apps || !firebase.apps.length) firebase.initializeApp(window.__FIREBASE_CONFIG__);
    }
    function signedInUser() {
      initFirebase();
      if (firebase.auth().currentUser) return Promise.resolve(firebase.auth().currentUser);
      return new Promise(resolve => {
        const unsubscribe = firebase.auth().onAuthStateChanged(user => { unsubscribe(); resolve(user || null); });
      });
    }
    function errorMarkup(message) {
      document.getElementById('loadingState').hidden = true;
      document.getElementById('formContent').innerHTML = Renderer.buildEmptyMarkup(message, {
        emptyHref: 'makeup.html',
        emptyLinkLabel: '← Back to make-up cases',
      });
    }
    function relatedRecord(requested) {
      if (!requested) return null;
      if (!Makeup.isWalkin(requested)) return requested;
      return Makeup.relatedForm(requested, DB.leave()) || requested;
    }
    function statusFor(record, raw, parentSignedState) {
      const element = document.getElementById('formStatus');
      const icon = document.getElementById('formStatusIcon');
      const title = document.getElementById('formStatusTitle');
      const message = document.getElementById('formStatusText');
      const signed = record && Makeup.hasParentApproval(record);
      const paper = clean(record && record.makeupMode) === 'paper' || (raw && Makeup.stateFor(raw, record) === 'paper_required');
      element.hidden = false;
      element.className = 'mf-status' + (paper ? ' paper' : '');
      if (paper) {
        icon.textContent = '!';
        title.textContent = signed ? 'Parent signature recorded · Paper submission required' : 'Paper submission required';
        message.textContent = Makeup.PAPER_INSTRUCTION;
        return;
      }
      icon.textContent = '✓';
      if (signed) {
        title.textContent = parentSignedState === 'recorded' ? 'Parent signature recorded' : 'Parent signature already recorded';
        message.textContent = 'The signed make-up form is ready to print or review.';
      } else {
        title.textContent = 'Make-up leave form';
        message.textContent = 'This form has not received a parent signature yet.';
      }
    }
    async function bootstrap() {
      try {
        const params = new URLSearchParams(window.location.search);
        const id = clean(params.get('id'));
        if (!id) throw new Error('No make-up leave ID was provided.');
        const user = await signedInUser();
        const email = clean(user && user.email).toLowerCase();
        if (!email) throw new Error('Please sign in before viewing a make-up leave form.');
        await DB.initForPortal(email);
        if (DB.status().mode !== 'firebase') throw new Error(DB.status().error || 'Could not load this form.');
        if (!DB.leave().some(item => item.id === id)) {
          await DB.initForAdmin(email);
          if (DB.status().mode !== 'firebase') throw new Error('This form is not available for the signed-in account.');
        }
        const requested = DB.leave().find(item => item.id === id);
        if (!requested) throw new Error('Make-up leave record not found.');
        const record = relatedRecord(requested);
        const raw = Makeup.isWalkin(requested)
          ? requested
          : DB.leave().find(item => Makeup.isWalkin(item) && (clean(record.reconciliationSourceId) === clean(item.id) || clean(item.reconciledByLeaveId) === clean(record.id)));
        const caseId = raw && raw.id ? raw.id : clean(record.reconciliationSourceId);
        if (caseId) document.getElementById('backButton').href = 'makeup.html?case=' + encodeURIComponent(caseId);
        const rendered = Renderer.renderInto(document.getElementById('formContent'), record, {
          emptyHref: 'makeup.html',
          emptyLinkLabel: '← Back to make-up cases',
        });
        document.getElementById('loadingState').hidden = true;
        if (!rendered) return;
        statusFor(record, raw, clean(params.get('parentSigned')));
        document.title = 'Make-up Leave Form | ' + clean(record.englishName || record.chineseName || record.studentNo || 'IBSH');
      } catch (error) {
        errorMarkup(error && error.message ? error.message : 'Could not load this make-up leave form.');
      }
    }
    bootstrap();
  </script>
</body>
</html>
